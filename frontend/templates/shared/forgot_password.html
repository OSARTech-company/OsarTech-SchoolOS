<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico', v='20260411b') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css', v='20260228b') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css', v='20260307f') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .login-container {
            max-width: 450px;
            margin: 40px auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .login-header {
            text-align: center;
            margin-bottom: 25px;
        }
        .login-header h1 {
            font-size: 24px;
            color: #333;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .btn-block {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        .btn-block:hover {
            background: #0056b3;
        }
        .back-to-login {
            display: block;
            text-align: center;
            margin-top: 15px;
            text-decoration: none;
            color: #007bff;
        }
    </style>
</head>
<body class="login-page">
    {% include "shared/_premium_alerts.html" %}

    <div class="login-container">
        <div class="login-header">
            <h1>Request Password Reset</h1>
            <p>Send a request to your school administrator.</p>
        </div>

        <form method="post" action="{{ url_for('forgot_password') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="form-group">
                <label for="username">Username / ID</label>
                <input type="text" id="username" name="username" required placeholder="Enter your ID">
            </div>

            <div class="form-group">
                <label for="school_id">School ID (or code)</label>
                <input type="text" id="school_id" name="school_id" required placeholder="Enter your school code">
            </div>

            <div class="form-group">
                <label for="role">Account Role</label>
                <select id="role" name="role" required>
                    <option value="">-- Select Role --</option>
                    <option value="student">Student</option>
                    <option value="teacher">Teacher</option>
                </select>
            </div>

            <div class="form-group">
                <label for="reason">Reason (Optional)</label>
                <textarea id="reason" name="reason" rows="3" placeholder="I forgot my password..."></textarea>
            </div>

            <button type="submit" class="btn btn-block">Submit Request</button>
        </form>

        <a href="{{ url_for('login') }}" class="back-to-login">
            <i class="fas fa-arrow-left"></i> Back to Login
        </a>
    </div>
</body>
</html>
