<script>
    (function() {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.setAttribute('data-theme', 'dark');
        } else if (savedTheme === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
        } else {
            document.documentElement.removeAttribute('data-theme');
        }
    })();
</script>

<script>
    // Show loading overlay on page start
    let loadingTimeout = null;
    function showLoadingOverlay() {
        const overlay = document.getElementById('loading-overlay');
        if (overlay) {
            overlay.classList.add('show');
            if (loadingTimeout) clearTimeout(loadingTimeout);
            // Safety timeout: auto-hide the overlay after 6 seconds in case page does not unload (e.g. file downloads)
            loadingTimeout = setTimeout(hideLoadingOverlay, 6000);
        }
    }

    // Hide loading overlay when page is ready
    function hideLoadingOverlay() {
        const overlay = document.getElementById('loading-overlay');
        if (overlay) {
            overlay.classList.remove('show');
        }
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
    }

    // Show overlay when page starts loading
    window.addEventListener('beforeunload', showLoadingOverlay);

    // Hide overlay when page finishes loading
    window.addEventListener('load', function() {
        hideLoadingOverlay();
    });

    // Also hide after a short delay to ensure page is rendered
    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(hideLoadingOverlay, 300);
    });

    // Show loading on form submission (for form pages)
    document.addEventListener('submit', function(e) {
        if (e.target && e.target.getAttribute) {
            if (e.target.getAttribute('data-async-submit') === '1' || e.target.getAttribute('data-loading-skip') === '1' || e.target.getAttribute('data-no-loading') === '1') {
                return;
            }
            const action = (e.target.getAttribute('action') || '').toLowerCase();
            if (action.includes('export') || action.includes('download') || action.includes('print')) {
                return;
            }
        }
        if (e.target.method && e.target.method.toLowerCase() === 'post') {
            showLoadingOverlay();
        }
    }, true);

    // Show loading on link clicks (optional, for slower connections)
    document.addEventListener('click', function(e) {
        const link = e.target.closest('a');
        if (link && link.href && !link.href.startsWith('#') && !link.target) {
            const rawHref = (link.getAttribute('href') || '').trim();
            const lowerHref = rawHref.toLowerCase();
            const url = new URL(link.href, window.location.href);
            const path = (url.pathname || '').toLowerCase();
            const isDownloadOrExport =
                link.hasAttribute('download') ||
                path.includes('/download') ||
                path.includes('download') ||
                path.includes('/export') ||
                path.includes('export') ||
                path.includes('print') ||
                /\.(pdf|csv|xlsx?|xls|zip|doc|docx|ppt|pptx|rtf|txt)($|\?|#)/i.test(lowerHref) ||
                lowerHref.startsWith('blob:') ||
                lowerHref.startsWith('data:');
            
            const skipLoading =
                (link.dataset && (link.dataset.loadingSkip === '1' || link.dataset.noLoading === '1')) ||
                isDownloadOrExport;
            
            if (skipLoading) {
                return;
            }
            // Only show for internal navigation
            if (link.href.includes(window.location.hostname)) {
                showLoadingOverlay();
            }
        }
    }, true);

    // Global Theme Toggle Injector
    document.addEventListener('DOMContentLoaded', function() {
        // Skip on home and login pages to avoid duplicate toggles
        if (document.getElementById('landing-theme-toggle') || document.getElementById('auth-theme-toggle')) {
            return;
        }
        
        // Skip if already exists
        if (document.getElementById('global-theme-toggle')) {
            return;
        }

        const btn = document.createElement('button');
        btn.id = 'global-theme-toggle';
        btn.className = 'global-theme-toggle-btn';
        btn.type = 'button';
        btn.setAttribute('aria-label', 'Toggle theme');
        
        const updateIcon = (theme) => {
            if (theme === 'dark') {
                btn.innerHTML = '<i class="fas fa-sun"></i>';
            } else {
                btn.innerHTML = '<i class="fas fa-moon"></i>';
            }
        };

        const currentTheme = document.documentElement.getAttribute('data-theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        updateIcon(currentTheme);
        document.body.appendChild(btn);

        btn.addEventListener('click', function() {
            const activeTheme = document.documentElement.getAttribute('data-theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            const newTheme = activeTheme === 'dark' ? 'light' : 'dark';
            if (newTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
            }
            updateIcon(newTheme);
            window.dispatchEvent(new Event('theme-changed'));
        });
    });
</script>
